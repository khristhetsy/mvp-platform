<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCapOS — offline</title>
<meta name="theme-color" content="#0A1A40">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh;display:flex;
    align-items:center;justify-content:center;text-align:center;padding:24px;
    background:linear-gradient(160deg,#0A1A40 0%,#123A8F 60%,#1A6CE4 130%);color:#fff}
  .wrap{max-width:32ch}
  h1{font-size:1.4rem;font-weight:600;letter-spacing:-.01em}
  p{margin-top:10px;font-size:.95rem;line-height:1.55;opacity:.85}
  button{margin-top:22px;padding:12px 22px;border:none;border-radius:12px;cursor:pointer;
    background:#fff;color:#0A1A40;font-size:.95rem;font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <h1>You're offline</h1>
    <p>iCapOS needs a connection to load your workspace. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
