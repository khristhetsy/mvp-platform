name: Integration (DB schema invariants)

# Boots a real Supabase Postgres, applies every migration, and asserts the
# schema facts the money/compliance code depends on (RLS enabled, unique
# constraints present, critical columns exist). These can only be verified
# against a live database, which is why they live outside the unit suite.
#
# STATUS: added but not yet verified in CI. The first run on a branch will shake
# out any environment issues (CLI version, port, migration order). Do not treat
# green locally as proof — it needs one successful run here.

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase start` boots the local stack (Postgres + auth + storage) and
      # applies everything in supabase/migrations in order. This provides the
      # auth/storage schemas and roles the migrations reference.
      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Run integration tests
        run: npm run test:integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Stop Supabase
        if: always()
        run: supabase stop
