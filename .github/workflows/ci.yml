name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
        # The type graph is large enough to exhaust Node's default old-space
        # heap (~2GB) and OOM the compiler. Give it room so the check can't flake.
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # Informational: flags Supabase tables that exist in migrations but are
      # missing from the generated types (no column-level type safety). Not
      # blocking yet — regenerate with `npm run db:types`, then make it strict.
      - name: Supabase type drift (informational)
        run: npm run db:types:check
        continue-on-error: true

      - name: Test
        run: npm test

      # Whole-repo lint is informational only — there's an existing backlog we
      # don't want blocking every build.
      - name: Lint (full, informational)
        run: npm run lint
        continue-on-error: true

      # Blocking gate: only the files changed in this PR must be lint-clean
      # (errors). This stops new lint errors entering the codebase without
      # forcing a mass cleanup of the existing backlog. Pre-existing warnings
      # are allowed; new errors fail the build.
      - name: Lint changed files (blocking on PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE"...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|mjs)$' \
            | grep -vE '^mvp-platform/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No lintable files changed."
            exit 0
          fi
          echo "Linting changed files:"
          echo "$CHANGED"
          npx eslint $CHANGED

      - name: Build
        run: npm run build
        env:
          # Next runs type-checking inside the build worker; same OOM risk.
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Blocking gate: no untranslated i18n keys, deprecated brand hexes, or the
      # old "CapitalOS" name in the built output or rendered public HTML.
      - name: Pre-deploy guardrail
        run: npm run check:predeploy:full
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
